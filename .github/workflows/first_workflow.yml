name: First Workflow

on: 
  workflow_dispatch:

jobs:
  
  run-shell-commands:
    runs-on: ubuntu-latest
    steps:
      - name: echo a string
        run: echo "Hello, World!"

      - name: mutiline command
        run: |
          node -v
          npm -v

  parallel-jobs-macos:
    runs-on: macos-latest
    steps:
      - name: view software versions
        run: sw_vers
        
          
