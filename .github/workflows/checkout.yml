name: checkout
on:
  - push

jobs: 
  checkout-and-display-files:
    runs-on: ubuntu-latest
    steps:
      - name: list files before
        run: ls -la

      - name: checkout repo
        run: |
          git init 
          git remote add origin "https://${GITHUB_ACTOR}:${{d secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch origin
          git checkout main

      - name: list files after
        run: ls -la 
        
