name: workflow-commands
on:
  - push

jobs:
  testing-wf-commands:
    runs-on: ubuntu-latest
    steps:
    - name: Setting and error message
      run: |
        echo "::error title=missing semicolon"

    - name: Setting an error message with parameters
      run: |  
        echo "::error title=Error title,file=app.js,line=2,endLine=3,col=5,endCol=7::Missing another semicolon"
                
    - name: Setting an debug message with parameters
      run: |  
        echo "::debug title=debug title,file=app.js,line=2,endLine=3,col=5,endCol=7::Missing another semicolon"
                
    - name: Setting an warning message with parameters
      run: |  
        echo "::warning title=warning title,file=app.js,line=2,endLine=3,col=5,endCol=7::Missing another semicolon"
                

    - name: Setting an notice message with parameters
      run: |  
        echo "::notice title=notice title,file=app.js,line=2,endLine=3,col=5,endCol=7::Missing another semicolon"
                
    - name: group of logs
      run: |
        echo "::group::group title"
        echo "This is a group of logs"
        echo "This is another log in the group"
        echo "::endgroup::"

    - name: masking
      run: echo "::add-mask::secret_value"
      
    - name: echo masked value
      run: "echo secret_value"

