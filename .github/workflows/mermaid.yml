name: mermaid

on:
  push:
  workflow_dispatch: 



jobs:
  update-mermaid:
    runs-on: ubuntu-latest
    env:
      NODE_HOME: section_02
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd "$NODE_HOME" && (npm ci || npm install)

      - name: Update Mermaid graph in README.md
        run: cd "$NODE_HOME" && (npm run update-mermaid -- README.md)

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git status
          git diff
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "## 🎉 Hello from the job summary!" >> $GITHUB_STEP_SUMMARY
            echo "- This will appear in the job summary tab" >> $GITHUB_STEP_SUMMARY
          else
            git commit -m "chore: update Mermaid graph in README.md"
            echo "- chore: update Mermaid graph in README.md will appear in the job summary tab" >> $GITHUB_STEP_SUMMARY

          fi
          git push